<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>D&D - Crear Publicación</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f1ea; display: flex; justify-content: center; padding: 50px; }
        .publish-card { background: white; padding: 30px; border-radius: 12px; border: 2px solid #333; width: 100%; max-width: 500px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #764ba2; margin-bottom: 20px; }
        textarea { width: 100%; height: 120px; padding: 15px; border: 1px solid #ccc; border-radius: 8px; resize: none; font-size: 16px; margin-bottom: 20px; }
        .btn-post { width: 100%; padding: 15px; background: #764ba2; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; }
        .btn-post:hover { background: #667eea; }
        .back-link { display: block; text-align: center; margin-top: 15px; color: #888; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>

<div class="publish-card">
    <h2>¿Qué tienes en mente?</h2>
    <textarea id="post-content" placeholder="Escribe tu aventura aquí..."></textarea>
    <button class="btn-post" onclick="guardarPublicacion()">Publicar en el Muro</button>
    <a href="Principal.html" class="back-link">Cancelar y volver</a>
</div>

<script>
    function guardarPublicacion() {
        const contenido = document.getElementById('post-content').value.trim();
        const usuarioActivo = localStorage.getItem('usuarioSesion') || "Invitado";

        if (contenido === "") {
            alert("No puedes publicar algo vacío, viajero.");
            return;
        }

        // 1. Obtener las publicaciones que ya existen en la "base de datos" local
        // Si no hay ninguna, creamos un arreglo vacío []
        let muroGlobal = JSON.parse(localStorage.getItem('muroDND')) || [];

        // 2. Crear el nuevo objeto de publicación
        const nuevaPublicacion = {
            id: Date.now(), // Usamos la fecha como ID único
            autor: usuarioActivo,
            texto: contenido,
            fecha: new Date().toLocaleString(),
            likes: 0
        };

        // 3. Agregarlo al inicio de la lista
        muroGlobal.unshift(nuevaPublicacion);

        // 4. Guardarlo de nuevo en el localStorage (esto simula el JSON)
        localStorage.setItem('muroDND', JSON.stringify(muroGlobal));

        alert("¡Publicado con éxito!");
        window.location.href = "Principal.html";
    }
</script>

</body>
</html>
