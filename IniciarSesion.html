<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>D&D - Login</title>

    <!-- FUENTES -->
    <link href="https://fonts.googleapis.com/css2?family=Newsreader:wght@400;700;800&family=Work+Sans:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Work Sans', sans-serif;
            background: radial-gradient(circle at center, #4c0000 0%, #131313 70%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #e5e2e1;
        }

        .container {
            max-width: 420px;
            width: 90%;
            background: #1c1b1b;
            padding: 40px;
            border: 1px solid #554240;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
            position: relative;
        }

        /* ESQUINAS DECORATIVAS */
        .container::before,
        .container::after {
            content: "";
            position: absolute;
            width: 12px;
            height: 12px;
            border: 2px solid #ffb4a8;
        }

        .container::before {
            top: 0;
            left: 0;
            border-right: none;
            border-bottom: none;
        }

        .container::after {
            bottom: 0;
            right: 0;
            border-left: none;
            border-top: none;
        }

        h1 {
            text-align: center;
            font-family: 'Newsreader', serif;
            font-size: 3.5rem;
            color: #ffb4a8;
            letter-spacing: 5px;
        }

        h2 {
            text-align: center;
            font-size: 0.9rem;
            color: #a38b88;
            margin-bottom: 25px;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        label {
            font-size: 12px;
            color: #dcc0bd;
            margin-top: 15px;
            display: block;
            letter-spacing: 1px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 5px;
            border: 1px solid #554240;
            background: #131313;
            color: #e5e2e1;
            outline: none;
        }

        input:focus {
            border-color: #ffb4a8;
            box-shadow: 0 0 10px rgba(255,180,168,0.3);
        }

        button {
            width: 100%;
            padding: 14px;
            margin-top: 25px;

            background: #4c0000;
            color: #ffb4a8;

            border: none;
            border-left: 3px solid #554240;
            border-top: 1px solid #554240;

            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;

            transition: all 0.25s ease;
            position: relative;
        }

        button:hover {
            background: #690000;
            transform: translateX(5px);
            box-shadow: 0 0 15px rgba(240, 81, 62, 0.4);
        }

        button::after {
            content: "";
            position: absolute;
            inset: 0;
            opacity: 0;
            background: linear-gradient(
                to right,
                transparent,
                rgba(255, 180, 168, 0.2),
                transparent
            );
            transition: opacity 0.3s;
        }

        button:hover::after {
            opacity: 1;
        }

        .error-msg {
            color: #ffb4ab;
            text-align: center;
            font-size: 13px;
            margin-top: 10px;
            display: none;
            padding: 10px;
            background: #93000a;
        }

        .register-link {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: #a38b88;
        }

        .register-link a {
            color: #ffb4a8;
            text-decoration: none;
            font-weight: bold;
        }

        .register-link a:hover {
            text-decoration: underline;
        }

        small {
            color: #888;
        }

        /* SCROLL */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #131313; }
        ::-webkit-scrollbar-thumb { background: #4c0000; }
    </style>
</head>

<body>

<div class="container">
    <h1>D&D</h1>

    <div class="section">
        <h2>Iniciar Sesión</h2>
        <div id="mensaje-error" class="error-msg"></div>
        
        <label>Nombre de usuario:</label>
        <input type="text" id="user-input" placeholder="Tu usuario de la red">

        <label>Contraseña:</label>
        <input type="password" id="pass-input" placeholder="••••••••">

        <label>Token de Acceso:_jhW5kduAoqWa53DGBALCdEhqIZElfP1Dp9qM</label>
        <input type="password" id="token-input" placeholder="ghp_xxxxxxxxxxxx">
        <small>Necesario para acceder al grimorio.</small>

        <button onclick="validarLogin()">Entrar al Reino</button>

        <div class="register-link">
            ¿No tienes cuenta? <a href="Registro.html">Regístrate aquí</a>
        </div>
    </div>
</div>

<script>
    window.onload = function() {
        if (localStorage.getItem('usuarioSesion') && localStorage.getItem('gh_token_activo')) {
            window.location.href = "Principal.html";
        }
    };

    async function validarLogin() {
        const userField = document.getElementById('user-input').value.trim();
        const passField = document.getElementById('pass-input').value.trim();
        const tokenField = document.getElementById('token-input').value.trim();
        const errorMsg = document.getElementById('mensaje-error');

        errorMsg.style.display = "none";

        if (!userField || !passField || !tokenField) {
            errorMsg.style.display = "block";
            errorMsg.textContent = "Completa todos los campos.";
            return;
        }

        try {
            const repo = "Rain-2099/prueba";
            const urlAPI = `https://api.github.com/repos/${repo}/contents/BaseDeDatos.json`;

            const respuesta = await fetch(urlAPI, { 
                headers: { "Authorization": `token ${tokenField}` },
                cache: "no-store" 
            });

            if (respuesta.status === 401) {
                throw new Error("Token inválido.");
            }

            if (!respuesta.ok) throw new Error("Error al acceder.");

            const fileData = await respuesta.json();
            const contenidoLimpio = decodeURIComponent(escape(atob(fileData.content.replace(/\s/g, ''))));
            const data = JSON.parse(contenidoLimpio);

            const usuarioEncontrado = data.usuarios.find(u => 
                u.nombre_usuario === userField && u.contrasena === passField
            );

            if (usuarioEncontrado) {
                localStorage.setItem('usuarioSesion', usuarioEncontrado.nombre_usuario);
                localStorage.setItem('gh_token_activo', tokenField);
                window.location.href = "Principal.html";
            } else {
                errorMsg.style.display = "block";
                errorMsg.textContent = "Credenciales incorrectas.";
            }

        } catch (error) {
            errorMsg.style.display = "block";
            errorMsg.textContent = error.message;
        }
    }
</script>

</body>
</html>
