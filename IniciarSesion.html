<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>D&D - Login</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            max-width: 400px;
            width: 90%;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        h1 { text-align: center; color: #764ba2; margin-bottom: 10px; }
        h2 { text-align: center; font-size: 1.2em; color: #555; margin-bottom: 20px; }
        label { font-weight: bold; display: block; margin-top: 15px; font-size: 14px; color: #444; }
        
        input {
            width: 100%;
            padding: 12px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            outline: none;
        }
        
        input:focus { border-color: #667eea; box-shadow: 0 0 8px rgba(102,126,234,0.2); }
        
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            margin-top: 25px;
            transition: transform 0.2s;
        }

        button:hover { transform: translateY(-1px); opacity: 0.9; }

        .error-msg {
            color: #d9534f;
            text-align: center;
            font-size: 14px;
            margin-top: 10px;
            display: none;
            padding: 10px;
            background: #fdf2f2;
            border-radius: 5px;
        }

        .register-link {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
        }
        .register-link a { color: #667eea; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>D&D Academy</h1>

    <div class="section">
        <h2>Iniciar Sesión</h2>
        <div id="mensaje-error" class="error-msg"></div>
        
        <label>Nombre de usuario:</label>
        <input type="text" id="user-input" placeholder="Tu usuario de la red">

        <label>Contraseña:</label>
        <input type="password" id="pass-input" placeholder="••••••••">

        <label>Token de Acceso (_jhW5kduAoqWa53DGBALCdEhqIZElfP1Dp9qM):</label>
        <input type="password" id="token-input" placeholder="ghp_xxxxxxxxxxxx">
        <small style="color: #888; font-size: 11px;">Necesario para ver y crear publicaciones.</small>

        <button onclick="validarLogin()">Entrar al Reino</button>

        <div class="register-link">
            ¿No tienes cuenta? <a href="Registro.html">Regístrate aquí</a>
        </div>
    </div>
</div>

<script>
    // Si ya hay sesión, saltamos al Principal
    window.onload = function() {
        if (localStorage.getItem('usuarioSesion') && localStorage.getItem('gh_token_activo')) {
            window.location.href = "Principal.html";
        }
    };

    async function validarLogin() {
        const userField = document.getElementById('user-input').value.trim();
        const passField = document.getElementById('pass-input').value.trim();
        const tokenField = document.getElementById('token-input').value.trim();
        const errorMsg = document.getElementById('mensaje-error');

        errorMsg.style.display = "none";

        if (!userField || !passField || !tokenField) {
            errorMsg.style.display = "block";
            errorMsg.textContent = "Por favor, completa todos los campos, incluido el Token";
            return;
        }

        try {
            // Usamos el token ingresado para intentar leer la base de datos
            // Esto valida automáticamente si el token es real y tiene permisos
            const repo = "Rain-2099/prueba";
            const urlAPI = `https://api.github.com/repos/${repo}/contents/BaseDeDatos.json`;

            const respuesta = await fetch(urlAPI, { 
                headers: { "Authorization": `token ${tokenField}` },
                cache: "no-store" 
            });
            
            if (respuesta.status === 401) {
                throw new Error("El Token de GitHub es incorrecto o ha expirado.");
            }

            if (!respuesta.ok) throw new Error("No se pudo acceder a la base de datos.");

            const fileData = await respuesta.json();
            const contenidoLimpio = decodeURIComponent(escape(atob(fileData.content.replace(/\s/g, ''))));
            const data = JSON.parse(contenidoLimpio);
            
            const usuarios = data.usuarios;

            // Buscar usuario en la DB
            const usuarioEncontrado = usuarios.find(u => 
                u.nombre_usuario === userField && u.contrasena === passField
            );

            if (usuarioEncontrado) {
                // GUARDADO CRÍTICO: Guardamos usuario Y token
                localStorage.setItem('usuarioSesion', usuarioEncontrado.nombre_usuario);
                localStorage.setItem('gh_token_activo', tokenField);
                
                window.location.href = "Principal.html";
            } else {
                errorMsg.style.display = "block";
                errorMsg.textContent = "Usuario o contraseña incorrectos";
            }

        } catch (error) {
            console.error("Error:", error);
            errorMsg.style.display = "block";
            errorMsg.textContent = error.message;
        }
    }
</script>

</body>
</html>
