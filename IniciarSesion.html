<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>D&D - Login</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f4f1ea;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            max-width: 400px;
            width: 90%;
            background: white;
            padding: 30px;
            border: 2px solid #333;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        h1 { text-align: center; color: #8b0000; margin-bottom: 10px; }
        h2 { text-align: center; font-size: 1.2em; color: #555; }
        label { font-weight: bold; display: block; margin-top: 15px; }
        
        input {
            width: 100%;
            padding: 12px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }
        
        button {
            width: 100%;
            padding: 12px;
            background-color: #8b0000;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            margin-top: 20px;
        }

        button:hover { background-color: #a00000; }

        .error-msg {
            color: #d9534f;
            text-align: center;
            font-size: 14px;
            margin-top: 10px;
            display: none;
            padding: 10px;
            background: #fdf2f2;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>D&D Academy</h1>

    <div class="section">
        <h2>Iniciar Sesión</h2>
        <div id="mensaje-error" class="error-msg"></div>
        
        <label>Nombre de usuario:</label>
        <input type="text" id="user-input" placeholder="Tu usuario de GitHub">

        <label>Contraseña:</label>
        <input type="password" id="pass-input" placeholder="••••••••">

        <button onclick="validarLogin()">Entrar al Reino</button>
    </div>
</div>

<script>
    // Al cargar la página, verificamos si ya hay una sesión activa
    window.onload = function() {
        if (localStorage.getItem('usuarioSesion')) {
            window.location.href = "Principal.html";
        }
    };

    async function validarLogin() {
        const userField = document.getElementById('user-input').value.trim();
        const passField = document.getElementById('pass-input').value.trim();
        const errorMsg = document.getElementById('mensaje-error');

        // Limpiar errores previos
        errorMsg.style.display = "none";

        if (!userField || !passField) {
            errorMsg.style.display = "block";
            errorMsg.textContent = "Por favor, completa todos los campos";
            return;
        }

        try {
            // IMPORTANTE: Cambia esta URL por la URL RAW de tu archivo en GitHub
            // Ejemplo: 'https://raw.githubusercontent.com/TU_USUARIO/TU_REPO/main/BaseDeDatos.json'
            // O usa la ruta relativa si el archivo está en la misma carpeta del servidor:
            const URL_DB = 'BaseDeDatos.json'; 

            const respuesta = await fetch(URL_DB, { cache: "no-store" });
            
            if (!respuesta.ok) throw new Error("No se pudo cargar la base de datos");

            const data = await respuesta.json();
            const usuarios = data.usuarios;

            // Buscar usuario
            const usuarioEncontrado = usuarios.find(u => 
                u.nombre_usuario === userField && u.contrasena === passField
            );

            if (usuarioEncontrado) {
                // Guardamos los datos necesarios para la sesión
                localStorage.setItem('usuarioSesion', usuarioEncontrado.nombre_usuario);
                
                // Redirigir
                window.location.href = "Principal.html";
            } else {
                errorMsg.style.display = "block";
                errorMsg.textContent = "Usuario o contraseña incorrectos";
            }

        } catch (error) {
            console.error("Error:", error);
            errorMsg.style.display = "block";
            errorMsg.textContent = "Error de conexión con el servidor de datos";
        }
    }
</script>

</body>
</html>
