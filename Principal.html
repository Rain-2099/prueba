<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Test RPG XP</title>

<style>
body {
    background: #131313;
    color: white;
    font-family: Arial;
    text-align: center;
    padding: 50px;
}

.box {
    max-width: 400px;
    margin: auto;
    background: #1c1b1b;
    padding: 20px;
    border: 1px solid #554240;
}

.xp-bar {
    width: 100%;
    height: 20px;
    background: #000;
    border: 1px solid #555;
    margin: 10px 0;
}

.xp-fill {
    height: 100%;
    width: 0%;
    background: red;
}

button {
    padding: 10px;
    margin: 5px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="box">
    <h2 id="user">Usuario</h2>

    <h3>Nivel: <span id="nivel">1</span></h3>

    <div class="xp-bar">
        <div class="xp-fill" id="xp-fill"></div>
    </div>

    <p><span id="xp">0</span> / 100 XP</p>

    <button onclick="ganarXP(20)">⚔️ Ganar 20 XP</button>
    <button onclick="ganarXP(5)">❤️ Ganar 5 XP</button>
</div>
    
<script>
const feed = document.getElementById('main-feed');

const MI_USUARIO = localStorage.getItem('usuarioSesion');
const MI_TOKEN = localStorage.getItem('gh_token_activo');
const REPO = "Rain-2099/prueba";

let xp = 0;
let nivel = 1;
const XP_MAX = 100;

if (!MI_USUARIO || !MI_TOKEN) {
    window.location.href = "IniciarSesion.html";
} else {
    document.getElementById('nombre-perfil').textContent = `⚔️ ${MI_USUARIO}`;
}

// ===== RPG =====
function actualizarUI() {
    document.getElementById("nivel-num").textContent = nivel;
    document.getElementById("xp-actual").textContent = xp;
    document.getElementById("xp-fill").style.width = (xp / XP_MAX * 100) + "%";
}

async function cargarXP() {
    const url = `https://api.github.com/repos/${REPO}/contents/BaseDeDatos.json`;

    const res = await fetch(url, {
        headers: { Authorization: `token ${MI_TOKEN}` }
    });

    const file = await res.json();
    const db = JSON.parse(decodeURIComponent(escape(atob(file.content.replace(/\s/g,'')))));

    const user = db.usuarios.find(u => u.nombre_usuario === MI_USUARIO);

    xp = user.xp || 0;
    nivel = user.nivel || 1;

    actualizarUI();
}

async function guardarXP(db, sha) {
    const url = `https://api.github.com/repos/${REPO}/contents/BaseDeDatos.json`;

    await fetch(url, {
        method: "PUT",
        headers: {
            Authorization: `token ${MI_TOKEN}`,
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            message: "Update XP",
            content: btoa(unescape(encodeURIComponent(JSON.stringify(db, null, 2)))),
            sha: sha
        })
    });
}

async function ganarXP(cantidad) {
    const url = `https://api.github.com/repos/${REPO}/contents/BaseDeDatos.json`;

    const res = await fetch(url, {
        headers: { Authorization: `token ${MI_TOKEN}` }
    });

    const file = await res.json();
    const db = JSON.parse(decodeURIComponent(escape(atob(file.content.replace(/\s/g,'')))));

    const index = db.usuarios.findIndex(u => u.nombre_usuario === MI_USUARIO);

    xp = db.usuarios[index].xp || 0;
    nivel = db.usuarios[index].nivel || 1;

    xp += cantidad;

    if (xp >= XP_MAX) {
        xp -= XP_MAX;
        nivel++;
        alert("⚔️ Subiste a nivel " + nivel);
    }

    db.usuarios[index].xp = xp;
    db.usuarios[index].nivel = nivel;

    await guardarXP(db, file.sha);

    actualizarUI();
}

// ===== UI =====
function togglePublishBox() {
    const modal = document.getElementById('modal-overlay');
    modal.style.display = (modal.style.display === 'flex') ? 'none' : 'flex';
}

// ===== FEED =====
async function cargarFeed() {
    const urlAPI = `https://api.github.com/repos/${REPO}/contents/BaseDeDatos.json`;

    const respuesta = await fetch(urlAPI, {
        headers: { "Authorization": `token ${MI_TOKEN}` }
    });

    const fileData = await respuesta.json();
    const db = JSON.parse(decodeURIComponent(escape(atob(fileData.content.replace(/\s/g,'')))));

    let posts = [];

    db.usuarios.forEach(u => {
        if(u.publicaciones){
            u.publicaciones.forEach(p => {
                posts.push({...p, autor: u.nombre_usuario});
            });
        }
    });

    posts.sort((a,b)=>b.id-a.id);

    feed.innerHTML = "";

    posts.forEach(post=>{
        feed.innerHTML += `
        <div class="post">
            <div class="post-header">
                <div>
                    <h4>@${post.autor}</h4>
                    <small>${post.fecha}</small>
                </div>
            </div>
            <div class="post-content">${post.texto}</div>
            <button onclick="likePost(${post.id})">❤️ (${post.likes || 0})</button>
        </div>`;
    });
}

// ===== LIKE =====
async function likePost(postId) {
    const url = `https://api.github.com/repos/${REPO}/contents/BaseDeDatos.json`;

    const res = await fetch(url, {
        headers: { Authorization: `token ${MI_TOKEN}` }
    });

    const file = await res.json();
    const db = JSON.parse(decodeURIComponent(escape(atob(file.content.replace(/\s/g,'')))));

    db.usuarios.forEach(u=>{
        if(u.publicaciones){
            u.publicaciones.forEach(p=>{
                if(p.id === postId){
                    p.likes = (p.likes || 0) + 1;
                }
            });
        }
    });

    await guardarXP(db, file.sha);

    await ganarXP(5); // 💥 XP POR LIKE

    cargarFeed();
}

// ===== PUBLICAR =====
async function publicarAhora() {
    const texto = document.getElementById('post-text').value.trim();
    if (!texto) return;

    const url = `https://api.github.com/repos/${REPO}/contents/BaseDeDatos.json`;

    const res = await fetch(url, {
        headers: { Authorization: `token ${MI_TOKEN}` }
    });

    const file = await res.json();
    const db = JSON.parse(decodeURIComponent(escape(atob(file.content.replace(/\s/g,'')))));

    const index = db.usuarios.findIndex(u => u.nombre_usuario === MI_USUARIO);

    const nuevo = {
        id: Date.now(),
        texto: texto,
        fecha: new Date().toLocaleString(),
        likes: 0
    };

    if(!db.usuarios[index].publicaciones) db.usuarios[index].publicaciones=[];

    db.usuarios[index].publicaciones.unshift(nuevo);

    await guardarXP(db, file.sha);

    await ganarXP(20); // 💥 XP POR PUBLICAR

    togglePublishBox();
    cargarFeed();
}

// INIT
cargarXP();
cargarFeed();
</script>

</body>
</html>
