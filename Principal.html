<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>D&D Academy - Reino Principal</title>
    <link href="https://fonts.googleapis.com/css2?family=Newsreader:wght@400;700;800&family=Work+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Work Sans', sans-serif;
            background: radial-gradient(circle at center, #4c0000 0%, #131313 70%);
            color: #e5e2e1; min-height: 100vh;
        }

        /* HEADER */
        .header { 
            background: #1c1b1b; padding: 15px; border-bottom: 1px solid #554240;
            position: sticky; top: 0; z-index: 100; display: flex; justify-content: center;
        }
        .search-bar { width: 100%; max-width: 600px; }
        .search-bar input { 
            width: 100%; padding: 12px 20px; border: 1px solid #554240;
            background: #131313; color: #e5e2e1; outline: none;
        }

        /* SIDEBAR & XP */
        .container { display: flex; max-width: 1200px; margin: 20px auto; gap: 20px; padding: 0 20px; }
        .sidebar { width: 250px; background: #1c1b1b; padding: 20px; border: 1px solid #554240; position: sticky; top: 80px; height: fit-content; }
        .sidebar h3 { color: #ffb4a8; margin-bottom: 10px; font-size: 14px; letter-spacing: 2px; text-transform: uppercase; border-bottom: 1px solid #554240; padding-bottom: 5px; }
        
        .xp-container { margin: 15px 0; background: #131313; border: 1px solid #554240; padding: 10px; border-radius: 4px; }
        .xp-text { font-size: 11px; color: #ffb4a8; display: flex; justify-content: space-between; margin-bottom: 5px; }
        .xp-bar { width: 100%; height: 8px; background: #2c1a1a; border-radius: 4px; overflow: hidden; }
        #xp-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #ffb4a8, #4c0000); transition: width 0.5s ease; }

        .menu-item, .btn-crear {
            display: block; width: 100%; padding: 12px; margin-bottom: 10px;
            background: #131313; color: #a38b88; border-left: 3px solid #554240; border-top: 1px solid #554240;
            text-decoration: none; font-size: 13px; font-weight: bold; cursor: pointer; transition: all 0.25s; text-align: left;
        }
        .menu-item:hover { background: #4c0000; color: #ffb4a8; transform: translateX(5px); }
        .btn-crear { background: #4c0000; color: #ffb4a8; text-align: center; border: none; }

        /* FEED & POSTS */
        .feed { flex: 1; max-width: 600px; }
        .post { background: #1c1b1b; border: 1px solid #554240; padding: 20px; margin-bottom: 20px; animation: fadeIn 0.5s; }
        .post-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; border-bottom: 1px solid #554240; padding-bottom: 10px; }
        .avatar-group { display: flex; align-items: center; }
        .avatar { width: 45px; height: 45px; border-radius: 50%; margin-right: 12px; border: 2px solid #4c0000; object-fit: cover; }
        .post-info h4 { color: #ffb4a8; }
        .post-content { color: #e5e2e1; margin: 15px 0; line-height: 1.5; }
        
        .btn-follow { background: transparent; border: 1px solid #554240; color: #a38b88; padding: 5px 12px; font-size: 11px; cursor: pointer; border-radius: 4px; }
        .btn-follow.active { border-color: #ffb4a8; color: #ffb4a8; background: rgba(76, 0, 0, 0.3); }

        .btn-action { width: 100%; padding: 10px; border: none; background: #131313; color: #ffb4a8; cursor: pointer; font-weight: bold; margin-bottom: 10px; }
        .btn-action:hover { background: #4c0000; }

        /* COMENTARIOS */
        .comments-section { background: #131313; border-top: 1px solid #333; padding: 12px; }
        .comment-item { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 8px; padding-bottom: 8px; border-bottom: 1px solid #252424; }
        .comment-avatar { width: 24px; height: 24px; border-radius: 50%; border: 1px solid #4c0000; object-fit: cover; }
        .comment-body { font-size: 12px; color: #a38b88; line-height: 1.4; }
        .comment-body b { color: #ffb4a8; margin-right: 5px; }
        
        .comment-input-group { display: flex; gap: 8px; margin-top: 12px; }
        .comment-input { flex: 1; background: #1c1b1b; border: 1px solid #554240; color: white; padding: 8px 12px; font-size: 12px; outline: none; }
        .btn-comment-send { background: #4c0000; color: #ffb4a8; border: none; padding: 0 15px; cursor: pointer; font-size: 11px; font-weight: bold; }

        /* MODAL */
        #modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center; }
        #modal-content { background: #1c1b1b; padding: 25px; border: 1px solid #554240; width: 90%; max-width: 500px; }
        #post-text { width: 100%; height: 100px; background: #131313; color: white; border: 1px solid #554240; padding: 10px; margin-bottom: 15px; outline: none; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeUp { 0% { opacity: 0; transform: translate(-50%, -40%); } 50% { opacity: 1; transform: translate(-50%, -50%); } 100% { opacity: 0; transform: translate(-50%, -60%); } }
    </style>
</head>
<body>

    <div class="header">
        <div class="search-bar"><input type="text" placeholder="🔍 Buscar en el Reino..."></div>
    </div>

    <div class="container">
        <div class="sidebar">
            <h3 id="nombre-perfil">Cargando...</h3>
            
            <div class="xp-container">
                <div class="xp-text">
                    <span>NIVEL <b id="nivel-num">1</b></span>
                    <span><b id="xp-actual">0</b> / 100 XP</span>
                </div>
                <div class="xp-bar"><div id="xp-fill"></div></div>
            </div>

            <a class="menu-item" href="./Principal.html">📱 Inicio</a>
            <button class="btn-crear" onclick="togglePublishBox()">➕ Publicar (+20 XP)</button>
            <a class="menu-item" href="./Usuario.html">👤 Mi Perfil</a>
            <button class="menu-item logout" onclick="cerrarSesion()" style="color:#ffb4ab">🚪 Salir</button>
        </div>

        <div id="modal-overlay">
            <div id="modal-content">
                <h3 style="color: #ffb4a8; margin-bottom: 15px;">Nueva Publicación</h3>
                <textarea id="post-text" placeholder="¿Qué aventuras compartirás hoy?"></textarea>
                <div style="display: flex; gap: 10px;">
                    <button onclick="publicarAhora()" style="flex: 2; background: #4c0000; color: #ffb4a8; border: none; padding: 12px; font-weight: bold; cursor: pointer;">Publicar</button>
                    <button onclick="togglePublishBox()" style="flex: 1; background: #333; color: #ccc; border: none; cursor: pointer;">Cancelar</button>
                </div>
            </div>
        </div>

        <div class="feed" id="main-feed"></div>
    </div>

<script>
    const MI_USUARIO = localStorage.getItem('usuarioSesion');
    const MI_TOKEN = localStorage.getItem('gh_token_activo');
    const REPO = "Rain-2099/prueba";
    const XP_MAX = 100;

    if (!MI_USUARIO || !MI_TOKEN) window.location.href = "Inicio.html";

    let listaSiguiendo = [];

    // --- SISTEMA CORE ---

    function actualizarUI() {
        const xp = localStorage.getItem("xp") || 0;
        const nivel = localStorage.getItem("nivel") || 1;
        document.getElementById("nivel-num").textContent = nivel;
        document.getElementById("xp-actual").textContent = xp;
        document.getElementById("xp-fill").style.width = (xp / XP_MAX * 100) + "%";
        document.getElementById('nombre-perfil').textContent = `⚔️ ${MI_USUARIO}`;
    }

    async function subirProgresoAGithub(nuevaXp, nuevoNivel) {
        try {
            const urlAPI = `https://api.github.com/repos/${REPO}/contents/BaseDeDatos.json`;
            const resGet = await fetch(urlAPI, { headers: { "Authorization": `token ${MI_TOKEN}` }, cache: "no-store" });
            const fileData = await resGet.json();
            const db = JSON.parse(decodeURIComponent(escape(atob(fileData.content.replace(/\s/g, '')))));
            const userIndex = db.usuarios.findIndex(u => u.nombre_usuario === MI_USUARIO);
            if(userIndex !== -1) {
                db.usuarios[userIndex].xp = nuevaXp;
                db.usuarios[userIndex].nivel = nuevoNivel;
                await fetch(urlAPI, {
                    method: "PUT",
                    headers: { "Authorization": `token ${MI_TOKEN}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        message: `Sincronización XP: ${MI_USUARIO}`,
                        content: btoa(unescape(encodeURIComponent(JSON.stringify(db, null, 2)))),
                        sha: fileData.sha
                    })
                });
            }
        } catch (e) { console.error(e); }
    }

    function ganarXP(cantidad) {
        let xp = parseInt(localStorage.getItem("xp")) || 0;
        let nivel = parseInt(localStorage.getItem("nivel")) || 1;
        xp += cantidad;
        while (xp >= XP_MAX) { xp -= XP_MAX; nivel++; }
        localStorage.setItem("xp", xp);
        localStorage.setItem("nivel", nivel);
        actualizarUI();
        subirProgresoAGithub(xp, nivel);
    }

    // --- FUNCIONES FEED Y SEGUIR ---

    async function toggleSeguir(targetUser) {
        try {
            const urlAPI = `https://api.github.com/repos/${REPO}/contents/BaseDeDatos.json`;
            const resGet = await fetch(urlAPI, { headers: { "Authorization": `token ${MI_TOKEN}` }, cache: "no-store" });
            const fileData = await resGet.json();
            const db = JSON.parse(decodeURIComponent(escape(atob(fileData.content.replace(/\s/g, '')))));

            const yo = db.usuarios.find(u => u.nombre_usuario === MI_USUARIO);
            const objetivo = db.usuarios.find(u => u.nombre_usuario === targetUser);

            if (!yo.siguiendo) yo.siguiendo = [];
            const index = yo.siguiendo.indexOf(targetUser);
            
            if (index === -1) {
                yo.siguiendo.push(targetUser);
                objetivo.seguidores = (objetivo.seguidores || 0) + 1;
                ganarXP(10); 
            } else {
                yo.siguiendo.splice(index, 1);
                objetivo.seguidores = Math.max(0, (objetivo.seguidores || 1) - 1);
            }

            await fetch(urlAPI, {
                method: "PUT",
                headers: { "Authorization": `token ${MI_TOKEN}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    message: `Social Update: ${MI_USUARIO}`,
                    content: btoa(unescape(encodeURIComponent(JSON.stringify(db, null, 2)))),
                    sha: fileData.sha
                })
            });
            cargarFeed();
        } catch (e) { console.error(e); }
    }

    async function cargarFeed() {
        const feed = document.getElementById('main-feed');
        try {
            const urlAPI = `https://api.github.com/repos/${REPO}/contents/BaseDeDatos.json`;
            const respuesta = await fetch(urlAPI, { headers: { "Authorization": `token ${MI_TOKEN}` }, cache: "no-store" });
            const data = await respuesta.json();
            const db = JSON.parse(decodeURIComponent(escape(atob(data.content.replace(/\s/g, '')))));

            const yo = db.usuarios.find(u => u.nombre_usuario === MI_USUARIO);
            listaSiguiendo = yo.siguiendo || [];
            localStorage.setItem("xp", yo.xp || 0);
            localStorage.setItem("nivel", yo.nivel || 1);
            actualizarUI();

            const mapaFotos = {};
            db.usuarios.forEach(u => mapaFotos[u.nombre_usuario] = u.foto_perfil);

            let posts = [];
            db.usuarios.forEach(u => {
                if(u.publicaciones) u.publicaciones.forEach(p => posts.push({...p, autor: u.nombre_usuario, foto_autor: u.foto_perfil}));
            });
            posts.sort((a,b) => b.id - a.id);
            
            feed.innerHTML = "";
            posts.forEach(p => {
                const loSigo = listaSiguiendo.includes(p.autor);
                let htmlComentarios = "";
                if(p.comentarios) {
                    p.comentarios.forEach(c => {
                        htmlComentarios += `
                            <div class="comment-item">
                                <img src="${mapaFotos[c.usuario] || 'https://via.placeholder.com/50'}" class="comment-avatar">
                                <div class="comment-body"><b>@${c.usuario}</b> ${c.texto}</div>
                            </div>`;
                    });
                }

                feed.innerHTML += `
                    <div class="post">
                        <div class="post-header">
                            <div class="avatar-group">
                                <img src="${p.foto_autor || 'https://via.placeholder.com/150'}" class="avatar">
                                <div class="post-info"><h4>@${p.autor}</h4><small>${p.fecha}</small></div>
                            </div>
                            ${p.autor !== MI_USUARIO ? `<button class="btn-follow ${loSigo?'active':''}" onclick="toggleSeguir('${p.autor}')">${loSigo?'✅ Siguiendo':'⚔️ Seguir'}</button>` : ''}
                        </div>
                        <div class="post-content">${p.texto}</div>
                        <button class="btn-action" onclick="darLike()">❤️ Me gusta (+5 XP)</button>
                        <div class="comments-section">
                            <div id="comments-list-${p.id}">${htmlComentarios}</div>
                            <div class="comment-input-group">
                                <input type="text" class="comment-input" id="input-${p.id}" placeholder="Comentar...">
                                <button class="btn-comment-send" onclick="enviarComentario('${p.autor}', ${p.id})">OK</button>
                            </div>
                        </div>
                    </div>`;
            });
        } catch(e) { feed.innerHTML = "Error al conectar con el servidor."; }
    }

    async function enviarComentario(autorPost, idPost) {
        const input = document.getElementById(`input-${idPost}`);
        const texto = input.value.trim();
        if(!texto) return;
        try {
            const urlAPI = `https://api.github.com/repos/${REPO}/contents/BaseDeDatos.json`;
            const resGet = await fetch(urlAPI, { headers: { "Authorization": `token ${MI_TOKEN}` }, cache: "no-store" });
            const fileData = await resGet.json();
            const db = JSON.parse(decodeURIComponent(escape(atob(fileData.content.replace(/\s/g, '')))));
            const duenio = db.usuarios.find(u => u.nombre_usuario === autorPost);
            const post = duenio.publicaciones.find(p => p.id === idPost);
            if(!post.comentarios) post.comentarios = [];
            post.comentarios.push({ usuario: MI_USUARIO, texto: texto, fecha: new Date().toLocaleString() });

            await fetch(urlAPI, {
                method: "PUT",
                headers: { "Authorization": `token ${MI_TOKEN}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    message: `Comentario: ${MI_USUARIO}`,
                    content: btoa(unescape(encodeURIComponent(JSON.stringify(db, null, 2)))),
                    sha: fileData.sha
                })
            });
            input.value = "";
            ganarXP(3);
            cargarFeed();
        } catch(e) { alert("Error al comentar."); }
    }

    async function publicarAhora() {
        const texto = document.getElementById('post-text').value.trim();
        if(!texto) return;
        try {
            const urlAPI = `https://api.github.com/repos/${REPO}/contents/BaseDeDatos.json`;
            const resGet = await fetch(urlAPI, { headers: { "Authorization": `token ${MI_TOKEN}` }, cache: "no-store" });
            const fileData = await resGet.json();
            const db = JSON.parse(decodeURIComponent(escape(atob(fileData.content.replace(/\s/g, '')))));
            const userIndex = db.usuarios.findIndex(u => u.nombre_usuario === MI_USUARIO);
            const nuevoPost = { id: Date.now(), texto: texto, fecha: new Date().toLocaleString(), likes: 0, comentarios: [] };
            db.usuarios[userIndex].publicaciones = db.usuarios[userIndex].publicaciones || [];
            db.usuarios[userIndex].publicaciones.unshift(nuevoPost);
            await fetch(urlAPI, {
                method: "PUT",
                headers: { "Authorization": `token ${MI_TOKEN}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    message: `Nuevo Post: ${MI_USUARIO}`,
                    content: btoa(unescape(encodeURIComponent(JSON.stringify(db, null, 2)))),
                    sha: fileData.sha
                })
            });
            ganarXP(20);
            document.getElementById('post-text').value = "";
            togglePublishBox();
            setTimeout(cargarFeed, 1000);
        } catch(e) { alert("Error al publicar."); }
    }

    function togglePublishBox() {
        const modal = document.getElementById('modal-overlay');
        modal.style.display = (modal.style.display === 'flex') ? 'none' : 'flex';
    }

    function darLike() { ganarXP(5); }

    function cerrarSesion() {
        localStorage.clear();
        window.location.href = "Inicio.html";
    }

    actualizarUI();
    cargarFeed();
</script>
</body>
</html>
