<script>
    const feed = document.getElementById('main-feed');
    let usuariosGlobal = [];
    const MI_USUARIO = localStorage.getItem('usuarioSesion') || "Invitado";
    
    // Recuperamos la configuración de GitHub guardada en la otra página
    const CONFIG_GH = JSON.parse(localStorage.getItem('gh_config'));

    async function cargarFeed() {
        try {
            feed.innerHTML = '<p style="text-align:center; color:white;">Cargando aventuras...</p>';

            // 1. Cargamos la DB directamente del servidor (con no-cache para ver cambios reales)
            const respuesta = await fetch('BaseDeDatos.json', { cache: "no-store" });
            const data = await respuesta.json();
            usuariosGlobal = data.usuarios;
            
            // 2. Cargamos las publicaciones del servidor (si tienes un array global de posts)
            // O, si tus posts están dentro de cada usuario, los extraemos:
            let todosLosPosts = [];
            usuariosGlobal.forEach(u => {
                if(Array.isArray(u.publicaciones)){
                    u.publicaciones.forEach(p => todosLosPosts.push({...p, autor: u.nombre_usuario, foto: u.foto_perfil}));
                }
            });

            // Ordenar por fecha (más recientes primero)
            todosLosPosts.sort((a, b) => b.id - a.id);

            feed.innerHTML = ''; // Limpiar mensaje de carga

            // 3. Renderizar
            todosLosPosts.forEach(post => {
                const html = `
                    <div class="post">
                        <div class="post-header">
                            <img src="${post.foto || 'https://via.placeholder.com/150'}" class="avatar">
                            <div class="post-info">
                                <h4>@${post.autor}</h4>
                                <small>${post.fecha || 'Reciente'}</small>
                            </div>
                        </div>
                        <div class="post-content">"${post.texto}"</div>
                        <div class="stats">
                            <span>❤️ <b class="likes-count">${post.likes || 0}</b> Likes</span>
                        </div>
                        <div class="post-actions">
                            <button class="btn-action" onclick="alert('Funcionalidad en desarrollo')">❤️ Like</button>
                            <button class="btn-action" onclick="mostrarInfo('${post.autor}')">💬 Info</button>
                        </div>
                    </div>
                `;
                feed.innerHTML += html;
            });

        } catch (error) {
            console.error("Error cargando el feed:", error);
            feed.innerHTML = '<p style="color:white;">Error al conectar con el servidor.</p>';
        }
    }

    async function publicarAhora() {
        const texto = document.getElementById('post-text').value.trim();
        if (!texto) return alert("¡No puedes publicar un mensaje vacío!");
        if (!CONFIG_GH) return alert("Configura primero tu GitHub en la página de Ficha.");

        const btn = event.target;
        btn.disabled = true;
        btn.textContent = "Subiendo al Reino...";

        try {
            // 1. Obtener la DB actual del servidor
            const url = `https://api.github.com/repos/${CONFIG_GH.repo}/contents/BaseDeDatos.json`;
            const resGet = await fetch(url, { headers: { "Authorization": `token ${CONFIG_GH.token}` } });
            const fileData = await resGet.json();
            const db = JSON.parse(decodeURIComponent(escape(atob(fileData.content))));

            // 2. Buscar al usuario logueado en la DB para añadirle la publicación
            const userIndex = db.usuarios.findIndex(u => u.nombre_usuario === MI_USUARIO);
            
            if (userIndex === -1) {
                alert("Usuario no encontrado en la base de datos.");
            } else {
                const nuevaPublicacion = {
                    id: Date.now(),
                    texto: texto,
                    fecha: new Date().toLocaleDateString(),
                    likes: 0
                };

                // Inicializar array si no existe
                if(!Array.isArray(db.usuarios[userIndex].publicaciones)) db.usuarios[userIndex].publicaciones = [];
                
                db.usuarios[userIndex].publicaciones.unshift(nuevaPublicacion);

                // 3. Guardar cambios en GitHub
                const resPut = await fetch(url, {
                    method: "PUT",
                    headers: { "Authorization": `token ${CONFIG_GH.token}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        message: `Nueva publicación de ${MI_USUARIO}`,
                        content: btoa(unescape(encodeURIComponent(JSON.stringify(db, null, 2)))),
                        sha: fileData.sha
                    })
                });

                if (resPut.ok) {
                    alert("¡Publicado en el servidor!");
                    togglePublishBox();
                    cargarFeed();
                }
            }
        } catch (e) {
            alert("Error al conectar con GitHub.");
        } finally {
            btn.disabled = false;
            btn.textContent = "Publicar ahora";
        }
    }

    // Funciones auxiliares
    function mostrarInfo(username) {
        const usuario = usuariosGlobal.find(u => u.nombre_usuario === username);
        if (usuario) alert(`Usuario: ${usuario.nombre_usuario}\nDescripción: ${usuario.descripcion || "Aventurero"}`);
    }

    function cerrarSesion() {
        localStorage.removeItem('usuarioSesion');
        window.location.href = "Inicio.html";
    }

    cargarFeed();
</script>
