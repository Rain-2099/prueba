<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Test RPG XP</title>

<style>
body {
    background: #131313;
    color: white;
    font-family: Arial;
    text-align: center;
    padding: 50px;
}

.box {
    max-width: 400px;
    margin: auto;
    background: #1c1b1b;
    padding: 20px;
    border: 1px solid #554240;
}

.xp-bar {
    width: 100%;
    height: 20px;
    background: #000;
    border: 1px solid #555;
    margin: 10px 0;
}

.xp-fill {
    height: 100%;
    width: 0%;
    background: red;
}

button {
    padding: 10px;
    margin: 5px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="box">
    <h2 id="user">Usuario</h2>

    <h3>Nivel: <span id="nivel">1</span></h3>

    <div class="xp-bar">
        <div class="xp-fill" id="xp-fill"></div>
    </div>

    <p><span id="xp">0</span> / 100 XP</p>

    <button onclick="ganarXP(20)">⚔️ Ganar 20 XP</button>
    <button onclick="ganarXP(5)">❤️ Ganar 5 XP</button>
</div>

<script>
// ===== CONFIG =====
const REPO = "TU_USUARIO/TU_REPO"; // 🔴 CAMBIA ESTO
const TOKEN = "TU_TOKEN_AQUI";     // 🔴 CAMBIA ESTO
const USUARIO = "testUser";        // 🔴 usuario que exista en JSON

let xp = 0;
let nivel = 1;
const XP_MAX = 100;

// ===== UI =====
function actualizarUI() {
    document.getElementById("nivel").textContent = nivel;
    document.getElementById("xp").textContent = xp;
    document.getElementById("xp-fill").style.width = (xp / XP_MAX * 100) + "%";
    document.getElementById("user").textContent = "@" + USUARIO;
}

// ===== CARGAR DESDE GITHUB =====
async function cargarXP() {
    const url = `https://api.github.com/repos/${REPO}/contents/BaseDeDatos.json`;

    const res = await fetch(url, {
        headers: { Authorization: `token ${TOKEN}` }
    });

    const file = await res.json();
    const db = JSON.parse(atob(file.content));

    const user = db.usuarios.find(u => u.nombre_usuario === USUARIO);

    xp = user.xp || 0;
    nivel = user.nivel || 1;

    actualizarUI();
}

// ===== GUARDAR EN GITHUB =====
async function guardarXP() {
    const url = `https://api.github.com/repos/${REPO}/contents/BaseDeDatos.json`;

    const res = await fetch(url, {
        headers: { Authorization: `token ${TOKEN}` }
    });

    const file = await res.json();
    const db = JSON.parse(atob(file.content));

    const index = db.usuarios.findIndex(u => u.nombre_usuario === USUARIO);

    db.usuarios[index].xp = xp;
    db.usuarios[index].nivel = nivel;

    await fetch(url, {
        method: "PUT",
        headers: {
            Authorization: `token ${TOKEN}`,
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            message: "Update XP",
            content: btoa(JSON.stringify(db, null, 2)),
            sha: file.sha
        })
    });
}

// ===== GANAR XP =====
async function ganarXP(cantidad) {
    xp += cantidad;

    if (xp >= XP_MAX) {
        xp -= XP_MAX;
        nivel++;
        alert("⚔️ SUBISTE A NIVEL " + nivel);
    }

    actualizarUI();
    await guardarXP();
}

// INIT
cargarXP();
</script>

</body>
</html>
