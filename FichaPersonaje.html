<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ficha de Personaje - D&D</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f1ea;
            margin: 20px;
        }
        .container {
            max-width: 900px;
            margin: auto;
            background: white;
            padding: 20px;
            border: 2px solid #333;
            border-radius: 10px;
        }
        h1, h2 {
            text-align: center;
        }
        .section {
            margin-bottom: 20px;
        }
        label {
            font-weight: bold;
        }
        input, textarea, select {
            width: 100%;
            padding: 5px;
            margin-top: 5px;
            margin-bottom: 10px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Ficha de Personaje</h1>

    <div class="section">
        <h2>Información Básica</h2>
        <label>Nombre del personaje:</label>
        <input type="text">

        <label>Clase:</label>
        <input type="text">

        <label>Raza:</label>
        <input type="text">

        <label>Nivel:</label>
        <input type="number">

        <label>Alineación:</label>
        <input type="text">
    </div>

    <div class="section">
        <h2>Atributos</h2>
        <div class="grid">
            <div>
                <label>Fuerza</label>
                <input type="number">
            </div>
            <div>
                <label>Destreza</label>
                <input type="number">
            </div>
            <div>
                <label>Constitución</label>
                <input type="number">
            </div>
            <div>
                <label>Inteligencia</label>
                <input type="number">
            </div>
            <div>
                <label>Sabiduría</label>
                <input type="number">
            </div>
            <div>
                <label>Carisma</label>
                <input type="number">
            </div>
        </div>
    </div>

    <div class="section">
        <h2>Combate</h2>
        <label>Puntos de Vida:</label>
        <input type="number">

        <label>Clase de Armadura:</label>
        <input type="number">

        <label>Iniciativa:</label>
        <input type="number">

        <label>Velocidad:</label>
        <input type="text">
    </div>

    <div class="section">
        <h2>Habilidades</h2>
        <textarea rows="5" placeholder="Escribe tus habilidades..."></textarea>
    </div>

    <div class="section">
        <h2>Equipo</h2>
        <textarea rows="5" placeholder="Lista de objetos y armas..."></textarea>
    </div>

    <div class="section">
        <h2>Historia del Personaje</h2>
        <textarea rows="6" placeholder="Describe la historia..."></textarea>
    </div>

    <button onclick="alert('Ficha guardada (simulación)')" href="#">Guardar</button>
</div>

</body>
</html>
