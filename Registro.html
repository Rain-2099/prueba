<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro de Aventurero</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; color: #333;
        }
        .register-card { 
            background: white; padding: 40px; border-radius: 15px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 100%; max-width: 400px; 
        }
        .register-card h2 { color: #764ba2; margin-bottom: 25px; text-align: center; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        .input-group input { 
            width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; 
            outline: none; transition: 0.3s; 
        }
        .input-group input:focus { border-color: #667eea; box-shadow: 0 0 8px rgba(102,126,234,0.3); }
        .btn-register { 
            width: 100%; padding: 15px; border: none; border-radius: 8px; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            color: white; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px;
        }
        .btn-register:hover { opacity: 0.9; transform: translateY(-1px); }
        .login-link { text-align: center; margin-top: 20px; font-size: 14px; }
        .login-link a { color: #667eea; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="register-card">
        <h2>Unirse al Reino</h2>
        <div class="input-group">
            <label>Nombre de Usuario</label>
            <input type="text" id="reg-username" placeholder="Ej: dragon_slayer99">
        </div>
        <div class="input-group">
            <label>Contraseña</label>
            <input type="password" id="reg-password" placeholder="••••••••">
        </div>
        <div class="input-group">
            <label>URL de Foto de Perfil (Opcional)</label>
            <input type="text" id="reg-photo" placeholder="https://imagen.com/foto.jpg">
        </div>
        <button class="btn-register" onclick="ejecutarRegistro()">Crear Cuenta</button>
        <div class="login-link">
            ¿Ya tienes cuenta? <a href="Inicio.html">Inicia Sesión</a>
        </div>
    </div>

<script>
    async function ejecutarRegistro() {
        const user = document.getElementById('reg-username').value.trim();
        const pass = document.getElementById('reg-password').value.trim();
        const foto = document.getElementById('reg-photo').value.trim();
        
        if (!user || !pass) return alert("Por favor, completa los campos obligatorios.");

        // Recuperar config de GitHub
        const CONFIG_GH = JSON.parse(localStorage.getItem('gh_config'));
        if (!CONFIG_GH) return alert("⚠️ Error: Configura primero tu GitHub en la Ficha Técnica.");

        const url = `https://api.github.com/repos/${CONFIG_GH.repo}/contents/BaseDeDatos.json`;

        try {
            // 1. Obtener base de datos actual
            const resGet = await fetch(url, { 
                headers: { "Authorization": `token ${CONFIG_GH.token}` },
                cache: "no-store" 
            });
            const fileData = await resGet.json();
            const db = JSON.parse(decodeURIComponent(escape(atob(fileData.content))));

            // 2. Validar si existe
            if (db.usuarios.find(u => u.nombre_usuario === user)) {
                return alert("Ese nombre de usuario ya existe.");
            }

            // 3. Crear estructura completa para que el usuario pueda postear
            const nuevoUsuario = {
                nombre_usuario: user,
                password: pass,
                foto_perfil: foto || "https://via.placeholder.com/150",
                descripcion: "¡Nuevo en la red!",
                seguidores: 0,
                me_gustas_totales: 0,
                publicaciones: [], // Esencial para que el feed no falle
                baneos: { esta_baneado: false, razon: "" }
            };

            db.usuarios.push(nuevoUsuario);

            // 4. Guardar en GitHub
            const resPut = await fetch(url, {
                method: "PUT",
                headers: { 
                    "Authorization": `token ${CONFIG_GH.token}`,
                    "Content-Type": "application/json" 
                },
                body: JSON.stringify({
                    message: `Nuevo usuario registrado: ${user}`,
                    content: btoa(unescape(encodeURIComponent(JSON.stringify(db, null, 2)))),
                    sha: fileData.sha
                })
            });

            if (resPut.ok) {
                alert("¡Registro exitoso! Ahora inicia sesión.");
                window.location.href = "Inicio.html";
            }

        } catch (e) {
            console.error(e);
            alert("Error de conexión con el servidor.");
        }
    }
</script>

</body>
</html>
