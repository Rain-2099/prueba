
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro de Aventurero</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; color: #333; padding: 20px;
        }
        .register-card { 
            background: white; padding: 30px; border-radius: 15px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 100%; max-width: 400px; 
        }
        .register-card h2 { color: #764ba2; margin-bottom: 20px; text-align: center; }
        .input-group { margin-bottom: 12px; }
        .input-group label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 13px; color: #555; }
        .input-group input { 
            width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; 
            outline: none; transition: 0.3s; font-size: 14px;
        }
        .input-group input:focus { border-color: #667eea; box-shadow: 0 0 8px rgba(102,126,234,0.3); }
        .token-info { font-size: 11px; color: #888; margin-top: 4px; line-height: 1.2; }
        .btn-register { 
            width: 100%; padding: 14px; border: none; border-radius: 8px; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            color: white; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 15px;
        }
        .btn-register:hover { opacity: 0.9; transform: translateY(-1px); }
        .login-link { text-align: center; margin-top: 20px; font-size: 14px; }
        .login-link a { color: #667eea; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="register-card">
        <h2>Unirse al Reino</h2>
        
        <div class="input-group">
            <label>Nombre de Usuario</label>
            <input type="text" id="reg-username" placeholder="Ej: dragon_slayer99">
        </div>

        <div class="input-group">
            <label>Contraseña</label>
            <input type="password" id="reg-password" placeholder="••••••••">
        </div>

        <div class="input-group">
            <label>URL de Foto de Perfil (Opcional)</label>
            <input type="text" id="reg-photo" placeholder="https://imagen.com/foto.jpg">
        </div>

        <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">

        <div class="input-group">
            <label>Token de Acceso (_jhW5kduAoqWa53DGBALCdEhqIZElfP1Dp9qM)</label>
            <input type="password" id="reg-token" placeholder="ghp_xxxxxxxxxxxx">
            <p class="token-info">Si dejas esto en blanco, se usará el token por defecto del sistema.</p>
        </div>

        <button class="btn-register" onclick="ejecutarRegistro()">Crear Cuenta</button>

        <div class="login-link">
            ¿Ya tienes cuenta? <a href="Inicio.html">Inicia Sesión</a>
        </div>
    </div>

<script>
async function ejecutarRegistro() {
    const user = document.getElementById('reg-username').value.trim();
    const pass = document.getElementById('reg-password').value.trim();
    const foto = document.getElementById('reg-photo').value.trim();
    const tokenUsuario = document.getElementById('reg-token').value.trim();
    
    if (!user || !pass) return alert("Completa los campos obligatorios.");
 
    const CONFIG_GH = {
        // Si el usuario puso uno, usa ese. Si no, usa el tuyo.
        token: 'ghp'+tokenUsuario ,
        repo: "rain-2099/prueba"
    };

    const ARCHIVO = "BaseDeDatos.json";
    const url = `https://api.github.com/repos/${CONFIG_GH.repo}/contents/${ARCHIVO}`;

    try {
        const resGet = await fetch(url, { 
            headers: { "Authorization": `token ${CONFIG_GH.token}` },
            cache: "no-store" 
        });

        if (!resGet.ok) {
            if (resGet.status === 401) throw new Error("Token inválido o expirado.");
            throw new Error("No se pudo acceder a la base de datos.");
        }

        const fileData = await resGet.json();
        const contenidoLimpio = decodeURIComponent(escape(atob(fileData.content.replace(/\s/g, ''))));
        const db = JSON.parse(contenidoLimpio);

        if (db.usuarios.find(u => u.nombre_usuario === user)) {
            return alert("Este aventurero ya existe en el reino.");
        }

        const nuevoId = db.usuarios.length > 0 
            ? Math.max(...db.usuarios.map(u => u.id || 0)) + 1 
            : 1;

        const nuevoUsuario = {
            id: nuevoId,
            nombre_usuario: user,
            contrasena: pass, 
            foto_perfil: foto || "https://via.placeholder.com/150",
            descripcion: "¡Nuevo en la red!",
            personajes:[],
            xp:0,
            nivel:1,
            seguidores: 0,
            me_gustas_totales: 0,
            publicaciones: [], 
            baneos: { esta_baneado: false, razon: "" }
        };

        db.usuarios.push(nuevoUsuario);

        const nuevoContenidoJSON = JSON.stringify(db, null, 2);
        const contenidoBase64 = btoa(unescape(encodeURIComponent(nuevoContenidoJSON)));

        const resPut = await fetch(url, {
            method: "PUT",
            headers: { 
                "Authorization": `token ${CONFIG_GH.token}`,
                "Content-Type": "application/json" 
            },
            body: JSON.stringify({
                message: `Nuevo aventurero: ${user}`,
                content: contenidoBase64,
                sha: fileData.sha
            })
        });

        if (resPut.ok) {
            // Guardamos el token en localStorage para que 'Principal.html' también pueda usarlo
            localStorage.setItem('token_activo', CONFIG_GH.token);
            
            alert(`¡Éxito! Bienvenido al reino, aventurero ${user}.`);
            window.location.href = "Inicio.html";
        } else {
            const errorData = await resPut.json();
            throw new Error(errorData.message);
        }
    } catch (e) {
        alert("Error crítico: " + e.message);
    }
}
</script>

</body>
</html>
