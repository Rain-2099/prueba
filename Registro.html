<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ficha de Personaje - D&D (Auto-Config)</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f1ea; margin: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 25px; border: 2px solid #333; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .section { margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px dashed #ccc; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        label { font-weight: bold; display: block; margin-top: 10px; color: #444; }
        input, textarea { width: 100%; padding: 10px; margin-top: 5px; box-sizing: border-box; border: 1px solid #ddd; border-radius: 5px; }
        
        /* Botones */
        .btn-guardar { width: 100%; padding: 15px; background-color: #8b0000; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 18px; font-weight: bold; transition: 0.3s; }
        .btn-guardar:hover { background-color: #a00000; transform: translateY(-2px); }
        
        /* Sección de Configuración */
        #config-panel { background: #f9f9f9; padding: 20px; border-radius: 8px; border: 1px solid #eee; margin-top: 20px; }
        .hidden { display: none; }
        .config-toggle { background: none; border: 1px solid #ccc; color: #666; padding: 5px 10px; cursor: pointer; font-size: 12px; margin-bottom: 10px; border-radius: 4px; }
    </style>
</head>
<body>

<div class="container">
    <button class="config-toggle" onclick="toggleConfig()">⚙️ Mostrar/Ocultar Configuración</button>
    
    <div id="config-panel" class="section">
        <h3>Configuración de GitHub</h3>
        <p style="font-size: 0.8em; color: #666;">Los datos se guardan solo en tu navegador.</p>
        <label>Personal Access Token:</label>
        <input type="password" id="gh_token" placeholder="ghp_xxxxxxxxxxxx">
        <label>Repositorio (usuario/repo):</label>
        <input type="text" id="gh_repo" placeholder="rain-2099/prueba">
        <label>Archivo JSON:</label>
        <input type="text" id="gh_path" value="personajes.json">
    </div>

    <h1>Ficha de Personaje</h1>

    <div class="section">
        <label>Dueño del Personaje (usuario_owner):</label>
        <input type="text" id="usuario_owner" placeholder="Tu nombre de usuario">
    </div>

    <div class="section">
        <h2>Información Básica</h2>
        <div class="grid">
            <div><label>Nombre</label><input type="text" id="nombre"></div>
            <div><label>Clase</label><input type="text" id="clase"></div>
            <div><label>Raza</label><input type="text" id="raza"></div>
        </div>
        <div class="grid">
            <div><label>Nivel</label><input type="number" id="nivel"></div>
            <div><label>Alineación</label><input type="text" id="alineacion"></div>
        </div>
    </div>

    <div class="section">
        <h2>Atributos</h2>
        <div class="grid">
            <div><label>Fuerza</label><input type="number" id="fuerza"></div>
            <div><label>Destreza</label><input type="number" id="destreza"></div>
            <div><label>Constitución</label><input type="number" id="constitucion"></div>
            <div><label>Inteligencia</label><input type="number" id="inteligencia"></div>
            <div><label>Sabiduría</label><input type="number" id="sabiduria"></div>
            <div><label>Carisma</label><input type="number" id="carisma"></div>
        </div>
    </div>

    <div class="section">
        <h2>Combate y Extras</h2>
        <div class="grid">
            <div><label>Vida (HP)</label><input type="number" id="hp"></div>
            <div><label>Armadura (CA)</label><input type="number" id="ca"></div>
            <div><label>Iniciativa</label><input type="number" id="iniciativa"></div>
        </div>
        <label>Habilidades (separadas por líneas):</label>
        <textarea id="habilidades" rows="3"></textarea>
        <label>Equipo:</label>
        <textarea id="equipo" rows="3"></textarea>
        <label>Historia:</label>
        <textarea id="historia" rows="4"></textarea>
    </div>

    <button class="btn-guardar" onclick="guardarFicha()">ENVIAR A GITHUB</button>
</div>

<script>
    // Al cargar la página
    window.onload = function() {
        const savedConfig = localStorage.getItem('gh_config');
        if (savedConfig) {
            const config = JSON.parse(savedConfig);
            document.getElementById('gh_token').value = config.token;
            document.getElementById('gh_repo').value = config.repo;
            document.getElementById('gh_path').value = config.path;
            
            // Si ya hay datos, ocultamos el panel automáticamente
            document.getElementById('config-panel').classList.add('hidden');
        }
    };

    function toggleConfig() {
        const panel = document.getElementById('config-panel');
        panel.classList.toggle('hidden');
    }

    async function guardarFicha() {
        const TOKEN = document.getElementById('gh_token').value;
        const REPO = document.getElementById('gh_repo').value;
        const PATH = document.getElementById('gh_path').value;

        if (!TOKEN || !REPO) {
            alert("⚠️ Por favor, configura tus datos de GitHub primero.");
            document.getElementById('config-panel').classList.remove('hidden');
            return;
        }

        // Guardar configuración para siempre
        localStorage.setItem('gh_config', JSON.stringify({ token: TOKEN, repo: REPO, path: PATH }));

        const nuevoPersonaje = {
            "id": Date.now(),
            "usuario_owner": document.getElementById('usuario_owner').value || "Invitado",
            "datos": {
                "nombre": document.getElementById('nombre').value,
                "clase": document.getElementById('clase').value,
                "raza": document.getElementById('raza').value,
                "nivel": parseInt(document.getElementById('nivel').value) || 0,
                "alineacion": document.getElementById('alineacion').value,
                "atributos": {
                    "fuerza": parseInt(document.getElementById('fuerza').value) || 0,
                    "destreza": parseInt(document.getElementById('destreza').value) || 0,
                    "constitucion": parseInt(document.getElementById('constitucion').value) || 0,
                    "inteligencia": parseInt(document.getElementById('inteligencia').value) || 0,
                    "sabiduria": parseInt(document.getElementById('sabiduria').value) || 0,
                    "carisma": parseInt(document.getElementById('carisma').value) || 0
                },
                "combate": {
                    "puntos_de_vida": parseInt(document.getElementById('hp').value) || 0,
                    "clase_armadura": parseInt(document.getElementById('ca').value) || 0,
                    "iniciativa": parseInt(document.getElementById('iniciativa').value) || 0,
                    "velocidad": "30 ft"
                },
                "habilidades": document.getElementById('habilidades').value.split('\n').filter(h => h.trim() !== ""),
                "equipo": document.getElementById('equipo').value.split('\n').filter(e => e.trim() !== ""),
                "historia": document.getElementById('historia').value
            }
        };

        try {
            const url = `https://api.github.com/repos/${REPO}/contents/${PATH}`;
            const resGet = await fetch(url, { headers: { "Authorization": `token ${TOKEN}` } });

            let content = { personajes: [] };
            let sha = "";

            if (resGet.ok) {
                const data = await resGet.json();
                sha = data.sha;
                content = JSON.parse(decodeURIComponent(escape(atob(data.content))));
            }

            content.personajes.push(nuevoPersonaje);
            const finalJSON = JSON.stringify(content, null, 2);

            const resPut = await fetch(url, {
                method: "PUT",
                headers: { "Authorization": `token ${TOKEN}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    message: `Añadido: ${nuevoPersonaje.datos.nombre}`,
                    content: btoa(unescape(encodeURIComponent(finalJSON))),
                    sha: sha
                })
            });

            if (resPut.ok) {
                alert("✅ ¡Personaje guardado con éxito!");
            } else {
                alert("❌ Error al subir. Verifica los permisos del Token.");
            }
        } catch (e) {
            alert("❌ Error de red.");
        }
    }
</script>

</body>
</html>
