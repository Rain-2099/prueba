<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro de Aventurero | El Reino</title>
    <link href="https://fonts.googleapis.com/css2?family=Newsreader:wght@400;700&family=Work+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Work Sans', sans-serif; 
            background: radial-gradient(circle at center, #4c0000 0%, #131313 70%); 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; color: #e5e2e1; padding: 20px;
        }

        .register-card { 
            background: #1c1b1b; 
            padding: 40px; 
            border-radius: 4px; 
            border: 2px solid #554240;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6); 
            width: 100%; 
            max-width: 450px; 
            position: relative;
        }

        /* Adorno de esquina */
        .register-card::after {
            content: "📜";
            position: absolute;
            top: -20px;
            right: -10px;
            font-size: 30px;
            transform: rotate(15deg);
        }

        .register-card h2 { 
            font-family: 'Newsreader', serif;
            color: #ffb4a8; 
            margin-bottom: 25px; 
            text-align: center; 
            font-size: 32px;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 1px solid #4c0000;
            padding-bottom: 10px;
        }

        .input-group { margin-bottom: 18px; }

        .input-group label { 
            display: block; 
            margin-bottom: 8px; 
            font-weight: 600; 
            font-size: 11px; 
            color: #a38b88; 
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-group input { 
            width: 100%; 
            padding: 12px; 
            background: #131313;
            border: 1px solid #554240; 
            border-radius: 4px; 
            outline: none; 
            transition: 0.3s; 
            font-size: 15px;
            color: #e5e2e1;
        }

        .input-group input:focus { 
            border-color: #ffb4a8; 
            box-shadow: 0 0 10px rgba(255,180,168,0.2); 
        }

        .token-info { 
            font-size: 10px; 
            color: #666; 
            margin-top: 6px; 
            font-style: italic;
        }

        .btn-register { 
            width: 100%; 
            padding: 16px; 
            border: 1px solid #ffb4a8; 
            border-radius: 4px; 
            background: #4c0000; 
            color: #ffb4a8; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 16px; 
            margin-top: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.4s;
        }

        .btn-register:hover { 
            background: #ffb4a8; 
            color: #4c0000; 
            box-shadow: 0 0 20px rgba(255, 180, 168, 0.4);
            transform: translateY(-2px);
        }

        .login-link { 
            text-align: center; 
            margin-top: 25px; 
            font-size: 13px; 
            color: #a38b88;
        }

        .login-link a { 
            color: #ffb4a8; 
            text-decoration: none; 
            font-weight: bold; 
            transition: 0.3s;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        hr {
            margin: 25px 0;
            border: 0;
            border-top: 1px solid #333;
        }
    </style>
</head>
<body>

    <div class="register-card">
        <h2>Unirse al Reino</h2>
        
        <div class="input-group">
            <label>Nombre de Aventurero (Usuario)</label>
            <input type="text" id="reg-username" placeholder="Ej: Grog_Strongjaw">
        </div>

        <div class="input-group">
            <label>Palabra de Poder (Contraseña)</label>
            <input type="password" id="reg-password" placeholder="••••••••">
        </div>

        <div class="input-group">
            <label>Retrato de Perfil (URL)</label>
            <input type="text" id="reg-photo" placeholder="https://imgur.com/tu-foto.jpg">
        </div>

        <hr>

        <div class="input-group">
            <label>Llave del Reino (GitHub Token)</label>
            <p style="font-size: 9px; color: #ffb4a8; margin-bottom: 5px;">Pista: jhW5kduAoqWa53DGBALCdEhqIZElfP1Dp9qM</p>
            <input type="password" id="reg-token" placeholder="xxxxxxxxxxxx">
            <p class="token-info">Si dejas esto en blanco, se usará el token por defecto.</p>
        </div>

        <button class="btn-register" onclick="ejecutarRegistro()">Inscribirse en la Crónica</button>

        <div class="login-link">
            ¿Ya eres parte de la historia? <a href="Inicio.html">Inicia Sesión</a>
        </div>
    </div>

<script>
async function ejecutarRegistro() {
    const user = document.getElementById('reg-username').value.trim();
    const pass = document.getElementById('reg-password').value.trim();
    const foto = document.getElementById('reg-photo').value.trim();
    const tokenUsuario = document.getElementById('reg-token').value.trim();
    
    if (!user || !pass) return alert("⚠️ Todo aventurero necesita nombre y contraseña.");
 
    const CONFIG_GH = {
        // Concatenación del prefijo ghp para seguridad básica
        token: 'ghp_' + tokenUsuario ,
        repo: "rain-2099/prueba"
    };

    const ARCHIVO = "BaseDeDatos.json";
    const url = `https://api.github.com/repos/${CONFIG_GH.repo}/contents/${ARCHIVO}`;

    try {
        const resGet = await fetch(url, { 
            headers: { "Authorization": `token ${CONFIG_GH.token}` },
            cache: "no-store" 
        });

        if (!resGet.ok) {
            if (resGet.status === 401) throw new Error("La Llave del Reino (Token) es inválida.");
            throw new Error("No se pudo conectar con la biblioteca del Reino.");
        }

        const fileData = await resGet.json();
        const contenidoLimpio = decodeURIComponent(escape(atob(fileData.content.replace(/\s/g, ''))));
        const db = JSON.parse(contenidoLimpio);

        if (db.usuarios.find(u => u.nombre_usuario === user)) {
            return alert("❌ Ese nombre ya ha sido reclamado por otro héroe.");
        }

        const nuevoId = db.usuarios.length > 0 
            ? Math.max(...db.usuarios.map(u => u.id || 0)) + 1 
            : 1;

        const nuevoUsuario = {
            id: nuevoId,
            nombre_usuario: user,
            contrasena: pass, 
            foto_perfil: foto || "https://img.freepik.com/vector-premium/icono-perfil-usuario-estilo-plano-ilustracion-vector-avatar-miembro-sobre-fondo-aislado-concepto-negocio-signo-permiso-humano_157943-15752.jpg",
            descripcion: "Un nuevo aventurero acaba de cruzar las puertas del Reino.",
            personajes:[],
            xp:0,
            nivel:1,
            seguidores: 0,
            me_gustas_totales: 0,
            publicaciones: [], 
            baneos: { esta_baneado: false, razon: "" }
        };

        db.usuarios.push(nuevoUsuario);

        const nuevoContenidoJSON = JSON.stringify(db, null, 2);
        const contenidoBase64 = btoa(unescape(encodeURIComponent(nuevoContenidoJSON)));

        const resPut = await fetch(url, {
            method: "PUT",
            headers: { 
                "Authorization": `token ${CONFIG_GH.token}`,
                "Content-Type": "application/json" 
            },
            body: JSON.stringify({
                message: `Nueva Crónica: ${user}`,
                content: contenidoBase64,
                sha: fileData.sha
            })
        });

        if (resPut.ok) {
            localStorage.setItem('token_activo', CONFIG_GH.token);
            alert(`✨ ¡Éxito! Tu nombre ha sido grabado en las crónicas, aventurero ${user}.`);
            window.location.href = "Inicio.html";
        } else {
            const errorData = await resPut.json();
            throw new Error(errorData.message);
        }
    } catch (e) {
        alert("❌ Error Místico: " + e.message);
    }
}
</script>

</body>
</html>
