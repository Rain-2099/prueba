<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>DYD</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;

            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            max-width: 400px;
            width: 100%;
            padding: 40px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            text-align: center;
        }

        h1 {
            font-size: 3.5rem;
            margin-bottom: 10px;
            color: #667eea;
            letter-spacing: 4px;
        }

        h2 {
            font-size: 1.2rem;
            color: #666;
            margin-bottom: 30px;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .boton {
            display: block;
            padding: 12px;
            text-decoration: none;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 8px;
            color: white;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .boton:hover {
            transform: translateY(-3px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .login-btn {
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); }
        ::-webkit-scrollbar-thumb { background: #764ba2; border-radius: 10px; }

    </style>
</head>

<body>

    <div class="container">
        <h1>DND</h1>
        <h2>Bienvenido</h2>
        
        <div class="button-group">
            <a href="./IniciarSesion.html" class="boton login-btn">Iniciar Sesión</a>
            <a href="./Registro.html" class="boton">Registrarse</a>
        </div>
    </div>

</body>
</html>
